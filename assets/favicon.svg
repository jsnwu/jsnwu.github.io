  <path fill="#083d5a" d="M30 50.5l3.5 7.5 2.5-1.5-1.5-6.5c-1.5.5-3 1-4.5 1.5z"/>
  <!-- White cheek / neck -->
  <path fill="#ffffff" d="M40 19c-5.5 0-10 3.5-12 8.5-.8 3.5.2 7.5 3 10 3.5 3.5 9 4.5 14 2 4.5-2.5 7-7.5 6-12.5-.8-4.5-5-8-11-8z"/>
