<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      try {
        var bootTheme = localStorage.getItem("theme");
        if (bootTheme === "light" || bootTheme === "dark") document.documentElement.dataset.theme = bootTheme;
      } catch (err) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Tags · Jason Wu</title>
    <meta name="description" content="Browse tags." />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app">
      <aside class="sidebar" id="site-sidebar" aria-label="Sidebar" data-include="/assets/partials/sidebar.html"></aside>

      <header class="topbar" aria-label="Top bar">
        <div class="topbar__inner">
          <div class="topbar__lead">
            <div data-include="/assets/partials/topbar-menu.html"></div>
            <div data-include="/assets/partials/topbar-crumb.html" data-breadcrumb='[{"text":"Home","href":"/"},{"text":"Tags"}]'></div>
          </div>
          <div class="topbar__tools">
            <div data-include="/assets/partials/topbar-theme.html"></div>
            <div data-include="/assets/partials/topbar-search.html"></div>
          </div>
        </div>
      </header>

      <main id="main" class="main" tabindex="-1">
        <div class="main-inner">
          <section class="content">
            <div class="post-header">
              <h1 class="post-title">Tags</h1>
            </div>

            <div class="form" data-tags-manager>
              <div data-tags-edit-only>
                <p class="muted small tags-manager__status" data-tag-meta-status aria-live="polite"></p>
                <div class="tag-row" aria-label="Add new tag">
                  <div class="tag-row__left">
                    <span class="tag-row__meta">New tag</span>
                  </div>
                  <input class="input input--sm" data-new-tag-name type="text" placeholder="new-tag" aria-label="New tag name" />
                  <div class="colorpick" data-new-tag-color aria-label="New tag color"></div>
                  <button class="button" type="button" data-add-tag>Add tag</button>
                </div>
              </div>

              <div class="tags-manager" data-tags-list aria-live="polite"></div>
            </div>
          </section>

          <aside class="rail" aria-label="Right rail" data-include="/assets/partials/rail-default.html"></aside>
        </div>
      </main>
    </div>

    <script src="/assets/js/main.js" defer></script>
  </body>
</html>
