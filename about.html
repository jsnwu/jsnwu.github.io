<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      try {
        var bootTheme = localStorage.getItem("theme");
        if (bootTheme === "light" || bootTheme === "dark") document.documentElement.dataset.theme = bootTheme;
      } catch (err) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>About · Jason Wu</title>
    <meta name="description" content="About this site." />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app">
      <aside class="sidebar" id="site-sidebar" aria-label="Sidebar" data-include="/assets/partials/sidebar.html"></aside>

      <header class="topbar" aria-label="Top bar">
        <div class="topbar__inner">
          <div class="topbar__lead">
            <div data-include="/assets/partials/topbar-menu.html"></div>
            <nav class="topbar__crumb" aria-label="Breadcrumb">
              <a class="topbar__crumb-link" href="/">Home</a>
              <span class="topbar__crumb-sep" aria-hidden="true">&gt;</span>
              <span class="topbar__crumb-current">About</span>
            </nav>
          </div>
          <div class="topbar__tools">
            <div data-include="/assets/partials/topbar-theme.html"></div>
            <div data-include="/assets/partials/topbar-search.html"></div>
          </div>
        </div>
      </header>

      <main id="main" class="main" tabindex="-1">
        <div class="main-inner">
          <article class="content" data-article>
            <header class="post-header">
              <h1 class="post-title">About</h1>
              <div class="post-meta">
                <span class="pill">Static</span>
                <span class="pill">No build</span>
                <span class="pill">GitHub Pages</span>
              </div>
            </header>

            <p>
              This is a minimal site inspired by the layout and “technical writing” vibe of
              <a href="https://chirpy.cotes.page/">Chirpy</a>.
            </p>
          </article>

          <aside class="rail" aria-label="Right rail" data-include="/assets/partials/rail-default.html"></aside>
        </div>
      </main>
    </div>

    <script src="/assets/js/main.js" defer></script>
  </body>
</html>
