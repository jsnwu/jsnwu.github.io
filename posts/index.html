<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      try {
        var bootTheme = localStorage.getItem("theme");
        if (bootTheme === "light" || bootTheme === "dark") document.documentElement.dataset.theme = bootTheme;
      } catch (err) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Posts · Jason Wu</title>
    <meta name="description" content="All posts." />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app">
      <aside class="sidebar" id="site-sidebar" aria-label="Sidebar" data-include="/assets/partials/sidebar.html"></aside>

      <header class="topbar" aria-label="Top bar">
        <div class="topbar__inner">
          <div class="topbar__lead">
            <div data-include="/assets/partials/topbar-menu.html"></div>
            <nav class="topbar__crumb" aria-label="Breadcrumb">
              <a class="topbar__crumb-link" href="/">Home</a>
              <span class="topbar__crumb-sep" aria-hidden="true">&gt;</span>
              <span class="topbar__crumb-current">Posts</span>
            </nav>
          </div>
          <div class="topbar__tools">
            <div data-include="/assets/partials/topbar-theme.html"></div>
            <div data-include="/assets/partials/topbar-search.html"></div>
          </div>
        </div>
      </header>

      <main id="main" class="main" tabindex="-1">
        <div class="main-inner">
          <section class="content">
            <header class="post-header">
              <h1 class="post-title">Posts</h1>
              <div class="post-meta">
                <span class="muted">Search and browse everything.</span>
              </div>
            </header>

            <div class="cards" data-posts-index aria-live="polite"></div>
          </section>

          <aside class="rail" aria-label="Right rail" data-include="/assets/partials/rail-posts-index.html"></aside>
        </div>
      </main>
    </div>

    <script src="/assets/js/main.js" defer></script>
  </body>
</html>
